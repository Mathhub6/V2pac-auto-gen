name: CI

on:
  schedule:
    - cron: "0 22 * * 6"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/*.yml"
      - "rules.txt"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  TZ: Asia/Shanghai

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Set variables (China Time)
        run: |
          echo "RELEASE_NAME=update on $(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "TAG_NAME=$(date +%Y%m%d%H%M)" >> "$GITHUB_ENV"
          echo "FORMATTED_DATE=$(date +%F)" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Upgrade pip and install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install genpac

      - name: Download GFWLIST file
        run: |
          curl -L -o gfwlist.txt \
            https://raw.githubusercontent.com/gfwlist/gfwlist/master/gfwlist.txt

      - name: Download AWAvenue-Ads-Rule file
        run: |
          curl -L -o AWAvenue-Ads-Rule.txt \
            https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/AWAvenue-Ads-Rule.txt

      - name: Commit source file changes
        if: github.event_name != 'pull_request'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add gfwlist.txt AWAvenue-Ads-Rule.txt
          git commit -m "chore: ${FORMATTED_DATE} update source files" || echo "No changes to commit"
          git push origin HEAD:master || echo "Nothing to push"

      - name: Generate configuration files
        run: |
          mkdir -p pac
          genpac \
            --format=pac \
            --pac-proxy="__PROXY__" \
            --gfwlist-local="./gfwlist.txt" \
            --user-rule-from="./rules.txt,./AWAvenue-Ads-Rule.txt" \
            -o ./pac/pac.txt

      - name: Commit pac.txt
        if: github.event_name != 'pull_request'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          git add ./pac/pac.txt
          git commit -m "chore: ${FORMATTED_DATE} update ./pac/pac.txt" || echo "No changes to commit"
          git push origin HEAD:master || echo "Nothing to push"

      - name: Fetch tags
        if: github.event_name != 'pull_request'
        run: git fetch --tags --force

      - name: Delete previous release and tag
        if: github.event_name != 'pull_request'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          previous_tag=$(git tag --sort=-creatordate | head -n 1)

          if [ -n "$previous_tag" ]; then
            echo "Deleting previous tag: $previous_tag"
            git push --delete origin "$previous_tag" || true
            gh release delete "$previous_tag" --repo "$GITHUB_REPOSITORY" --yes || true
          else
            echo "No previous tag found"
          fi

      - name: Release and upload assets
        if: github.event_name != 'pull_request'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: ${{ env.RELEASE_NAME }}
          tag: ${{ env.TAG_NAME }}
          file_glob: true
          file: ./pac/*
